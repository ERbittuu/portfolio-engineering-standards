name: Feature request
description: Suggest an improvement
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is annoying?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Alternatives welcome.
    validations:
      required: true

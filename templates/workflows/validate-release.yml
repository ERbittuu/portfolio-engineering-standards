# PR check, scoped to release/* branches only: does CHANGELOG have a
# section for this version, and is the version actually higher than the
# last one shipped? Both guard the one moment that creates a permanent,
# unmovable tag (see release-merge.yml) — catches typos and stale
# CHANGELOG entries before that tag ever gets created.
#
# Skips (passes trivially) for any PR that isn't from a release/* branch.
name: Validate Release

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release:
    if: startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need full tag history for the version check

      - name: Check branch name shape
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION="${BRANCH#release/}"

          case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::branch '$BRANCH' doesn't match release/X.Y.Z"
              exit 1
              ;;
          esac

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Verify version is newer than the latest tag
        run: |
          LATEST=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -1)
            if [ "$VERSION" = "$LATEST" ] || [ "$HIGHEST" != "$VERSION" ]; then
              echo "::error::release/$VERSION is not newer than the latest shipped version, v$LATEST"
              exit 1
            fi
          fi

      - name: Verify CHANGELOG has a section for this version
        run: |
          grep -q "^## \[$VERSION\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — add it before merging."
            exit 1
          }
